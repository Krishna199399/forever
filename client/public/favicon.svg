<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 48 48">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F472B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main heart shape -->
  <path 
    d="M24 41.5c-1.5 0-2.5-0.5-3.5-1.5C15 35 8 28 6 22c-1.5-4.5 0-9.5 4-12 2.5-1.5 5.5-2 8.5-1 1.5 0.5 3 1.5 4.5 3 1.5-1.5 3-2.5 4.5-3 3-1 6-0.5 8.5 1 4 2.5 5.5 7.5 4 12-2 6-9 13-14.5 18-1 1-2 1.5-3.5 1.5z" 
    fill="url(#heartGradient)"
    filter="url(#glow)"
  />
  
  <!-- Rhythm wave accent -->
  <path 
    d="M15 24 Q18 20, 21 24 T27 24 Q30 20, 33 24" 
    stroke="#FFF"
    stroke-width="2"
    stroke-linecap="round"
    fill="none"
    opacity="0.6"
  />
  
  <!-- Small sparkle dots -->
  <circle cx="18" cy="18" r="1.5" fill="#FFF" opacity="0.8"/>
  <circle cx="30" cy="18" r="1.5" fill="#FFF" opacity="0.8"/>
  <circle cx="24" cy="14" r="1" fill="#FFF" opacity="0.6"/>
</svg>